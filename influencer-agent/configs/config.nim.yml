# NAT workflow config — NVIDIA NIM backend (default).
#
# Requires NVIDIA_API_KEY in the environment (get one at https://build.nvidia.com).
# The `influencer_decision` function IS the workflow: given a persona prompt and a post,
# it calls the configured LLM and returns a validated {decision, reason, responseText}.
# It never touches social_network or the filesystem — see src/influencer_agent/poller.py
# for the part of this service that does.

llms:
  decision_llm:
    _type: nim
    model_name: meta/llama-3.3-70b-instruct
    temperature: 0.4
    max_tokens: 600

workflow:
  _type: influencer_decision
  llm_name: decision_llm
  max_retries: 2
