services:
  customer-agent:
    build: ./customer-agent
    container_name: customer-agent
    ports:
      - "8001:8000"
    env_file:
      - .env

  influencer-agent:
    build: ./influencer-agent
    container_name: influencer-agent
    ports:
      - "8002:8000"
    env_file:
      - .env

  customer-support-api:
    build: ./Customer_Support_System
    container_name: customer-support-api
    ports:
      - "8003:8001"
    volumes:
      - customer_support_data:/app/data
    environment:
      - CS_DB_PATH=/app/data/customer_support.db
  
  customer-support-mcp:
    build:
      context: ./Customer_Support_System
      dockerfile: Dockerfile.mcp
    container_name: customer-support-mcp
    ports:
      - "8010:8010"
    volumes:
      - customer_support_data:/app/data
    environment:
      - CS_DB_PATH=/app/data/customer_support.db
      - MCP_PORT=8010

  customer-support-dashboard:
    build: ./Customer_Support_System/cs-monitor
    container_name: customer-support-dashboard
    ports:
      - "5173:5173"
    depends_on:
      - customer-support-api

  social-network:
    build: ./social_network
    container_name: social-network
    ports:
      - "3005:3000"
    env_file:
      - ./social_network/.env
    environment:
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - social_network_data:/app/data

volumes:
  customer_support_data:
  social_network_data:
