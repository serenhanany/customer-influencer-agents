# Customer persona definitions for the HappyTuna crisis simulation.
# Attributes follow persona_attributes.md's schema (floats 0.0-1.0).
# Edit this file directly to tweak personas -- no code changes needed.

personas:
  loyal_customer:
    display_name: "Loyal Long-time Customer"
    customer_id: "CUST-1001"
    attributes:
      loyalty: 0.95
      trust_level: 0.9
      risk_sensitivity: 0.3
      price_sensitivity: 0.1
      complaint_tendency: 0.1
      forgiveness_level: 0.9
    description: >
      Has bought HappyTuna products for years. Gives the company the
      benefit of the doubt and rarely complains, but genuine safety
      concerns still worry them.

  vocal_complainer:
    display_name: "Vocal Complainer"
    customer_id: "CUST-1002"
    attributes:
      loyalty: 0.2
      trust_level: 0.35
      risk_sensitivity: 0.65
      price_sensitivity: 0.4
      complaint_tendency: 0.95
      forgiveness_level: 0.2
    description: >
      Quick to voice displeasure, files tickets and posts publicly
      at the slightest issue. Low patience, low forgiveness.

  price_sensitive:
    display_name: "Price-Sensitive Shopper"
    customer_id: "CUST-1003"
    attributes:
      loyalty: 0.35
      trust_level: 0.55
      risk_sensitivity: 0.2
      price_sensitivity: 0.95
      complaint_tendency: 0.25
      forgiveness_level: 0.55
    description: >
      Buys HappyTuna mainly because it's affordable. Will switch to
      a competitor quickly if price or value feels off, but isn't
      particularly anxious about safety unless it's severe.

  risk_sensitive:
    display_name: "Risk-Sensitive Parent"
    customer_id: "CUST-1004"
    attributes:
      loyalty: 0.5
      trust_level: 0.6
      risk_sensitivity: 0.98
      price_sensitivity: 0.2
      complaint_tendency: 0.55
      forgiveness_level: 0.3
    description: >
      Buys for their family and is highly sensitive to any hint of
      a safety issue. Reacts strongly and quickly to contamination
      or recall news, slow to trust again afterward.

  skeptical_customer:
    display_name: "Already Skeptical Customer"
    customer_id: "CUST-1005"
    attributes:
      loyalty: 0.1
      trust_level: 0.15
      risk_sensitivity: 0.7
      price_sensitivity: 0.5
      complaint_tendency: 0.7
      forgiveness_level: 0.1
    description: >
      Had a bad experience with HappyTuna in the past (unrelated to
      the current crisis) and already distrusts the company. Assumes
      the worst by default and is very slow to forgive, regardless of
      how well the company communicates.
